<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <style>
      .bg{fill:#f3f6fb}
      .header{fill:#004578}
      .accent{fill:#0078d4}
      .white{fill:#fff}
      .muted{fill:#6b7280;font-family: 'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', Arial}
      .title{font-family:'Segoe UI', system-ui, -apple-system; font-size:40px; font-weight:700; fill:#fff}
      .subtitle{font-size:18px; fill:#e6f2ff}
      .h2{font-family:'Segoe UI'; font-size:22px; fill:#003254; font-weight:700}
      .p{font-family:'Segoe UI'; font-size:16px; fill:#10203a}
      .bullet{font-size:14px; fill:#10203a}
    </style>
  </defs>
  <rect width="1200" height="675" class="bg" rx="12"/>
  <rect x="40" y="30" width="1120" height="140" rx="12" class="header"/>
  <text x="72" y="86" class="title">ScoutFlow AI</text>
  <text x="72" y="116" class="subtitle">Autonomous Reasoning Co-Pilot for Student-Athlete Productivity &amp; Compliance Tracking</text>

  <g transform="translate(72,200)">
    <text class="h2">One-Page Executive Slide</text>
    <text x="0" y="36" class="p">• 3-Step Foundry-Inspired Pipeline: Context Parsing → Constraint Check → Action Synthesis</text>
    <text x="0" y="66" class="p">• Key Demo Findings: Weekly load = <tspan font-weight="700">19.0h</tspan> (triggers 18h warning)</text>
    <text x="0" y="96" class="p">• Critical Collision: BUS-301 Midterm — 2026-06-22 detected during tournament travel</text>
    <text x="0" y="126" class="p">• Safety: Honorific normalization (e.g., Dear Dr. Wong,), deterministic JSON outputs, PII minimization</text>

    <rect x="0" y="160" width="520" height="120" rx="10" fill="#fff" stroke="#e6eef9"/>
    <text x="14" y="190" class="h2">Outputs</text>
    <text x="14" y="218" class="bullet">• data/output/compliance_status.json</text>
    <text x="14" y="240" class="bullet">• data/output/accommodation_request_BUS-301.json</text>
    <text x="14" y="262" class="bullet">• Streamlit dashboard (main.py) — audit trace UI</text>

    <rect x="560" y="160" width="520" height="120" rx="10" fill="#fff" stroke="#e6eef9"/>
    <text x="574" y="190" class="h2">Judging Rubric</text>
    <text x="574" y="218" class="bullet">• Reasoning (20%) — Explicit step logs</text>
    <text x="574" y="240" class="bullet">• Reliability (20%) — Defensive parsing & tests</text>
    <text x="574" y="262" class="bullet">• UX (15%) — Polished demo UI</text>

    <text x="0" y="310" class="muted">Repository: https://github.com/KSharmaai/scoutflow-ai</text>
  </g>

  <rect x="40" y="540" width="1120" height="90" rx="10" fill="#fff" opacity="0.98"/>
  <text x="72" y="578" class="p">Prepared for Microsoft Agents League • Team Lead: Kuldeep Sharma</text>
  <text x="72" y="602" class="muted">Print: set paper size to A4/Letter, scale to fit, center on page.</text>
</svg>
